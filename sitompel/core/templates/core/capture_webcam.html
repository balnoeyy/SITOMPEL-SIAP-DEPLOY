<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capture Ujian - SITOMPEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 font-sans h-screen flex overflow-hidden">

    <aside class="w-80 bg-[#111c2a] text-white p-8 flex flex-col h-full shadow-2xl z-20">
        <div class="mb-8 flex items-center space-x-3">
            <i class="fa-solid fa-layer-group text-green-400 text-2xl"></i>
            <span class="text-xl font-bold tracking-wide">sitompel</span>
        </div>
        
        <h2 class="text-2xl font-bold mb-2">Scan Dokumen</h2>
        <p class="text-gray-400 text-sm mb-8">{{ sesi.nama_ujian }} - Kelas {{ sesi.kelas.nama_kelas }}</p>

        <form id="scanForm" method="POST" action="{% url 'api_upload_capture' sesi.id %}" class="flex-1 flex flex-col">
            {% csrf_token %}
            
            <div class="flex-1">
                <label class="block text-sm font-semibold text-gray-300 mb-2">1. Pilih Mahasiswa</label>
                <select id="pelajarSelect" name="pelajar_id" required class="w-full bg-white text-black px-4 py-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-400 mb-6">
                    <option value="" disabled selected>-- Pilih Mahasiswa --</option>
                    {% for pelajar in daftar_pelajar %}
                        <option value="{{ pelajar.id }}">{{ pelajar.nim }} - {{ pelajar.nama_pelajar }}</option>
                    {% endfor %}
                </select>

                <div class="bg-[#dcf0d0] text-black p-4 rounded-xl text-sm mb-6 shadow-sm">
                    <i class="fa-solid fa-circle-info mr-2"></i>
                    Arahkan kertas jawaban ke webcam laptop. Pastikan teks terbaca jelas di layar kanan.
                </div>
            </div>

            <input type="hidden" name="image_base64" id="hidden_image_data" required>

            <button type="button" id="captureBtn" class="w-full bg-green-500 hover:bg-green-600 text-[#111c2a] font-bold text-lg py-4 rounded-xl transition shadow-lg flex items-center justify-center disabled:opacity-50" disabled>
                <i class="fa-solid fa-camera mr-2"></i> Tangkap Gambar
            </button>
        </form>
    </aside>

    <main class="flex-1 bg-gray-900 relative flex items-center justify-center p-8">
        <video id="webcam" autoplay playsinline class="w-full h-full object-cover rounded-3xl shadow-inner border-4 border-gray-800"></video>
        
        <div class="absolute inset-0 flex items-center justify-center pointer-events-none p-12">
            <div class="w-[210mm] h-[297mm] max-h-full max-w-full border-4 border-dashed border-green-400/70 rounded-lg relative">
                <div class="absolute top-4 left-4 w-6 h-6 border-t-4 border-l-4 border-green-400"></div>
                <div class="absolute top-4 right-4 w-6 h-6 border-t-4 border-r-4 border-green-400"></div>
                <div class="absolute bottom-4 left-4 w-6 h-6 border-b-4 border-l-4 border-green-400"></div>
                <div class="absolute bottom-4 right-4 w-6 h-6 border-b-4 border-r-4 border-green-400"></div>
            </div>
        </div>

        <canvas id="canvas" class="hidden"></canvas>
    </main>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('canvas');
        const captureBtn = document.getElementById('captureBtn');
        const pelajarSelect = document.getElementById('pelajarSelect');
        const form = document.getElementById('scanForm');
        const hiddenImageData = document.getElementById('hidden_image_data');

        pelajarSelect.addEventListener('change', () => {
            captureBtn.disabled = !pelajarSelect.value;
        });

        navigator.mediaDevices.getUserMedia({ 
            video: { 
                width: { ideal: 1920 }, 
                height: { ideal: 1080 } 
            } 
        })
            .then(stream => {
                video.srcObject = stream;
            })
            .catch(err => {
                alert("Gagal mengakses webcam laptop. Pastikan tidak ditutup atau diblokir browser.");
                console.error(err);
            });

        captureBtn.addEventListener('click', () => {
            captureBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Mengekstrak...';
            captureBtn.disabled = true;

            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);

            const imageData = canvas.toDataURL('image/jpeg', 0.9);
            hiddenImageData.value = imageData;

            form.submit();
        });
    </script>
</body>
</html>
