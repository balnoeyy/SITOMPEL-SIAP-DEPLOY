<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SITOMPEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 font-sans flex h-screen items-center justify-center">

    <div class="bg-white rounded-[2rem] shadow-xl flex w-full max-w-4xl overflow-hidden min-h-[500px]">
        
        <div class="w-1/2 bg-[#111c2a] text-white p-12 flex flex-col justify-center relative">
            <div class="flex items-center space-x-3 mb-6">
                <i class="fa-solid fa-layer-group text-green-400 text-4xl"></i>
                <span class="text-3xl font-bold tracking-wide">sitompel</span>
            </div>
            <h1 class="text-4xl font-bold mb-4">Welcome<br>Back!</h1>
            <p class="text-gray-400 text-sm">Automated Assessment System to support your grading process with RAG and Google Vision OCR.</p>
        </div>

        <div class="w-1/2 p-12 flex flex-col justify-center bg-[#f4f9f1]">
            <h2 class="text-2xl font-bold text-[#111c2a] mb-8">Sign In to Dashboard</h2>
            
            <form method="POST" class="space-y-5">
                {% csrf_token %}
                
                {% if form.errors %}
                <div class="bg-red-100 text-red-600 p-3 rounded-lg text-sm">
                    Kredensial tidak valid. Silakan coba lagi.
                </div>
                {% endif %}

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Username</label>
                    <input type="text" name="username" required class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-[#111c2a] focus:border-transparent transition">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Password</label>
                    <input type="password" name="password" required class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-[#111c2a] focus:border-transparent transition">
                </div>

                <div class="flex items-center justify-between mt-2">
                    <label class="flex items-center text-sm text-gray-600">
                        <input type="checkbox" class="mr-2 rounded text-[#111c2a] focus:ring-[#111c2a]"> Remember me
                    </label>
                    <a href="#" class="text-sm text-[#111c2a] font-semibold hover:underline">Forgot Password?</a>
                </div>

                <button type="submit" class="w-full bg-[#111c2a] text-white font-bold py-3 rounded-xl hover:bg-gray-800 transition duration-300 mt-6 shadow-lg shadow-gray-400/50">
                    Masuk
                </button>
            </form>
        </div>
    </div>

</body>
</html>
