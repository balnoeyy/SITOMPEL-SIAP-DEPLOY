<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lupa Password - SITOMPEL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 font-sans flex min-h-screen items-center justify-center p-4 md:p-6">

    <div class="bg-white rounded-[2rem] shadow-xl w-full max-w-xl overflow-hidden">
        <div class="bg-[#111c2a] text-white p-6 md:p-8">
            <div class="flex items-center space-x-3 mb-5">
                <i class="fa-solid fa-layer-group text-green-400 text-3xl"></i>
                <span class="text-2xl font-bold tracking-wide">sitompel</span>
            </div>
            <h1 class="text-3xl font-bold">Lupa Password</h1>
            <p class="text-gray-400 text-sm mt-2">Permintaan reset password pengajar akan dikirim ke dashboard admin.</p>
        </div>

        <div class="p-6 md:p-8 bg-[#f4f9f1]">
            {% if messages %}
                {% for message in messages %}
                    <div class="p-3 rounded-lg text-sm mb-4 {% if message.tags == 'success' %}bg-green-100 text-green-700{% else %}bg-red-100 text-red-600{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="POST" class="space-y-5">
                {% csrf_token %}
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Username Pengajar</label>
                    <input type="text" name="username" required class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-[#111c2a] focus:border-transparent transition">
                </div>

                <button type="submit" class="w-full bg-[#111c2a] text-white font-bold py-3 rounded-xl hover:bg-gray-800 transition duration-300 shadow-lg shadow-gray-400/50">
                    Kirim Permintaan ke Admin
                </button>
            </form>

            <a href="{% url 'login' %}" class="inline-flex items-center text-sm text-[#111c2a] font-bold hover:underline mt-6">
                <i class="fa-solid fa-arrow-left mr-2"></i> Kembali ke Login
            </a>
        </div>
    </div>

</body>
</html>
